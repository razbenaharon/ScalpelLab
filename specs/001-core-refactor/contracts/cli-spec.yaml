commands:
  scan:
    description: "Update database from filesystem"
    options:
      --dry-run:
        type: boolean
        description: "Preview changes only"
      --skip-seq:
        type: boolean
        description: "Skip SEQ file scanning"
      --fast:
        type: boolean
        description: "Skip duration calculation"
  
  export:
    description: "Convert SEQ to MP4"
    options:
      --targets:
        type: string
        description: "Filter string (e.g. 'today', 'Case1')"
      --force:
        type: boolean
        description: "Overwrite existing MP4s"
  
  redact:
    description: "Apply redaction masks"
    options:
      --config:
        type: string
        description: "Path to Excel timesheet"
        default: "times.xlsx"
